<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Renter Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #020617; color: #f3f4f6; font-family: 'Plus Jakarta Sans', sans-serif; }
        .neon-card { background: linear-gradient(135deg, #0b1528 0%, #070f1e 100%); border: 1px solid rgba(56, 189, 248, 0.1); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); }
        .neon-glow-text { text-shadow: 0 0 10px rgba(56, 189, 248, 0.6); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="pb-24 select-none">

    <!-- HEADER PROFILE -->
    <div class="p-4 max-w-md mx-auto">
        <div class="neon-card rounded-2xl p-4 flex items-center justify-between border-b-2 border-sky-500/30">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 rounded-full bg-sky-950/50 border border-sky-500/40 flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-robot text-sky-400 text-xl animate-pulse"></i>
                </div>
                <div>
                    <h2 class="text-sm font-bold text-sky-400 neon-glow-text" id="bot-name">Loading...</h2>
                    <p class="text-xs text-gray-400 font-mono" id="bot-username">@loading_bot</p>
                </div>
            </div>
            <span id="badge-status" class="px-2.5 py-1 text-[10px] font-extrabold rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 tracking-wider">AKTIF</span>
        </div>
    </div>

    <!-- MAIN DASHBOARD TAB -->
    <div id="tab-dashboard" class="tab-content active p-4 max-w-md mx-auto space-y-4">
        
        <!-- MASA AKTIF & LIMIT -->
        <div class="neon-card rounded-2xl p-4 space-y-3">
            <div class="flex justify-between items-center border-b border-gray-800 pb-2">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"><i class="fa-solid fa-calendar-days text-sky-400 mr-1"></i> Informasi Lisensi</span>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-900/60 p-3 rounded-xl border border-gray-800/60">
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Masa Aktif</p>
                    <p class="text-xs font-semibold text-sky-400 mt-0.5" id="val-expired">Loading...</p>
                </div>
                <div class="bg-slate-900/60 p-3 rounded-xl border border-gray-800/60">
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Kuota Harian</p>
                    <p class="text-xs font-semibold text-sky-400 mt-0.5" id="val-quota">0 / 0</p>
                </div>
            </div>
        </div>

        <!-- STATS COUNTER -->
        <div class="grid grid-cols-2 gap-3">
            <div class="neon-card rounded-2xl p-4 text-center relative overflow-hidden">
                <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">Total User</p>
                <h1 class="text-3xl font-black text-sky-400 mt-1 neon-glow-text" id="val-users">0</h1>
                <div class="mt-2 text-[10px] text-gray-400 bg-sky-950/30 py-0.5 rounded-md inline-block px-2 border border-sky-500/10">
                    Hari ini: <span class="text-emerald-400 font-bold" id="val-new-users">0</span>
                </div>
            </div>
            <div class="neon-card rounded-2xl p-4 text-center relative overflow-hidden">
                <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">Total Klik</p>
                <h1 class="text-3xl font-black text-sky-400 mt-1 neon-glow-text" id="val-clicks">0</h1>
                <div class="mt-2 text-[10px] text-gray-400 bg-sky-950/30 py-0.5 rounded-md inline-block px-2 border border-sky-500/10">
                    Tautan Aktif: <span class="text-sky-400 font-bold" id="link-count">0</span>
                </div>
            </div>
        </div>

        <!-- VISITOR GRAPH -->
        <div class="neon-card rounded-2xl p-4 space-y-2">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"><i class="fa-solid fa-chart-simple text-sky-400 mr-1"></i> Grafik Aktivitas</p>
            <div class="h-44 w-full pt-2">
                <canvas id="chartVisitors"></canvas>
            </div>
        </div>
    </div>

    <!-- LINKS TAB -->
    <div id="tab-links" class="tab-content p-4 max-w-md mx-auto space-y-3">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2"><i class="fa-solid fa-link text-sky-400 mr-1"></i> Manajemen Tautan</h3>
        <div class="space-y-2.5" id="link-container"></div>
    </div>

    <!-- FSUB TAB -->
    <div id="tab-fsub" class="tab-content p-4 max-w-md mx-auto space-y-3">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2"><i class="fa-solid fa-circle-nodes text-sky-400 mr-1"></i> Database Force Subscribe</h3>
        <div class="space-y-2.5" id="fsub-container"></div>
    </div>

    <!-- BOTTOM NAV BAR -->
    <div class="fixed bottom-0 left-0 right-0 bg-slate-950/95 backdrop-blur-md border-t border-sky-500/20 py-2.5 flex justify-around items-center z-50 max-w-md mx-auto rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="text-sky-400 text-xs flex flex-col items-center transition-all duration-300 transform scale-105"><i class="fa-solid fa-chart-pie text-lg mb-0.5"></i><span class="font-medium">Panel</span></button>
        <button onclick="switchTab('links')" id="nav-links" class="text-gray-500 text-xs flex flex-col items-center transition-all duration-300"><i class="fa-solid fa-link text-lg mb-0.5"></i><span class="font-medium">Tautan</span></button>
        <button onclick="switchTab('fsub')" id="nav-fsub" class="text-gray-500 text-xs flex flex-col items-center transition-all duration-300"><i class="fa-solid fa-circle-nodes text-lg mb-0.5"></i><span class="font-medium">FSub</span></button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function renderDashboard() {
            const params = new URLSearchParams(window.location.search);

            // Mapping presisi sesuai Query Params dari Python kamu
            const botName = params.get('bot_name') || 'Miky Asupan Bot';
            const botUsername = params.get('bot_username') || '@mikyasupan_bot';
            const expired = params.get('expired') || 'Tidak Aktif';
            const limitUsed = params.get('limit_used') || '0';
            const limitMax = params.get('limit_max') || '0';
            const totalUsers = params.get('total_users') || '0';
            const newUsers = params.get('new_users_today') || '0';
            const totalClicks = params.get('total_clicks') || '0';

            // Menyuplai data ke Elemen HTML
            document.getElementById('bot-name').innerText = botName;
            document.getElementById('bot-username').innerText = botUsername;
            document.getElementById('val-expired').innerText = expired;
            document.getElementById('val-quota').innerText = `${limitUsed} / ${limitMax}`;
            document.getElementById('val-users').innerText = totalUsers;
            document.getElementById('val-new-users').innerText = newUsers;
            document.getElementById('val-clicks').innerText = totalClicks;

            // PARSING FSUB DATA
            const fsubContainer = document.getElementById('fsub-container');
            fsubContainer.innerHTML = '';
            try {
                const fsubData = JSON.parse(params.get('fsubs') || '[]');
                if (fsubData.length > 0) {
                    fsubData.forEach(ch => {
                        fsubContainer.innerHTML += `
                            <div class="p-3 bg-slate-900/80 border border-gray-800 rounded-xl flex justify-between items-center shadow-inner">
                                <div class="truncate pr-2">
                                    <p class="text-xs font-bold text-sky-400 truncate">${ch.name}</p>
                                    <p class="text-[9px] text-gray-500 font-mono mt-0.5">${ch.id}</p>
                                </div>
                                <a href="${ch.link}" target="_blank" class="px-3 py-1 bg-sky-500/10 hover:bg-sky-500/20 border border-sky-500/30 text-sky-400 text-[10px] rounded-lg font-bold transition-all"><i class="fa-solid fa-arrow-up-right-from-square mr-1"></i>Gabung</a>
                            </div>`;
                    });
                } else {
                    fsubContainer.innerHTML = '<div class="text-center py-8 text-xs text-gray-500"><i class="fa-solid fa-circle-info block text-lg mb-1.5 opacity-40"></i>Tidak ada channel FSub aktif.</div>';
                }
            } catch (e) {
                fsubContainer.innerHTML = '<div class="text-center py-6 text-xs text-rose-400 border border-rose-500/20 bg-rose-500/5 rounded-xl">Gagal memproses data FSub.</div>';
            }

            // PARSING LINKS DATA
            const linkContainer = document.getElementById('link-container');
            linkContainer.innerHTML = '';
            try {
                const linkData = JSON.parse(params.get('links') || '[]');
                document.getElementById('link-count').innerText = linkData.length;
                if (linkData.length > 0) {
                    linkData.forEach((l, i) => {
                        linkContainer.innerHTML += `
                            <div class="p-3 bg-slate-900/80 border border-gray-800 rounded-xl space-y-2 shadow-inner">
                                <div class="flex justify-between items-center">
                                    <span class="text-[10px] font-bold text-gray-500 uppercase">Tautan #${i + 1}</span>
                                    <span class="px-2 py-0.5 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[10px] rounded font-bold font-mono"><i class="fa-solid fa-chart-line mr-1"></i>${l.clicks} Klik</span>
                                </div>
                                <p class="text-xs text-gray-300 font-mono truncate select-all bg-black/30 p-2 rounded-lg border border-gray-900">${l.short_url}</p>
                                <button onclick="navigator.clipboard.writeText('${l.short_url}'); tg.HapticFeedback.notificationOccurred('success'); animateCopy(this);" class="w-full py-1.5 bg-sky-950/60 hover:bg-sky-950 border border-sky-500/20 text-sky-400 text-[11px] rounded-lg font-bold transition-all flex items-center justify-center gap-1.5">
                                    <i class="fa-regular fa-copy"></i> <span>Salin Tautan</span>
                                </button>
                            </div>`;
                    });
                } else {
                    linkContainer.innerHTML = '<div class="text-center py-8 text-xs text-gray-500"><i class="fa-solid fa-link-slash block text-lg mb-1.5 opacity-40"></i>Belum ada tautan media yang dibuat.</div>';
                }
            } catch (e) {
                linkContainer.innerHTML = '<div class="text-center py-6 text-xs text-rose-400 border border-rose-500/20 bg-rose-500/5 rounded-xl">Gagal memproses data tautan.</div>';
            }

            // RENDER GRAPHICS CHART.JS
            try {
                const ctx = document.getElementById('chartVisitors').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Total User', 'User Baru', 'Total Klik'],
                        datasets: [{
                            data: [parseInt(totalUsers), parseInt(newUsers), parseInt(totalClicks)],
                            backgroundColor: ['rgba(56, 189, 248, 0.25)', 'rgba(74, 222, 128, 0.25)', 'rgba(244, 63, 94, 0.25)'],
                            borderColor: ['#38bdf8', '#4ade80', '#f43f5e'],
                            borderWidth: 1.5,
                            borderRadius: 8,
                            borderSkipped: false
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                            y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b', font: { size: 9 } } }
                        }
                    }
                });
            } catch (err) { console.error('Gagal memuat chart:', err); }
        }

        function animateCopy(btn) {
            const txt = btn.querySelector('span');
            const icon = btn.querySelector('i');
            txt.innerText = 'Tersalin!';
            icon.className = 'fa-solid fa-check text-emerald-400';
            setTimeout(() => {
                txt.innerText = 'Salin Tautan';
                icon.className = 'fa-regular fa-copy';
            }, 2000);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            document.querySelectorAll('div.fixed button').forEach(btn => {
                btn.className = "text-gray-500 text-xs flex flex-col items-center transition-all duration-300";
            });
            const activeBtn = document.getElementById(`nav-${tabId}`);
            activeBtn.className = "text-sky-400 text-xs flex flex-col items-center transition-all duration-300 transform scale-105";
            tg.HapticFeedback.impactOccurred('light');
        }

        window.addEventListener('DOMContentLoaded', renderDashboard);
    </script>
</body>
        </html>
